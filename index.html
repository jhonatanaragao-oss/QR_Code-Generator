<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gerador de QR Code</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section>
      <h1>Gerador de QR Code</h1>
      <p>Cole um link, gere o QR Code e use a imagem onde precisar.</p>

      <form id="qr-form" novalidate>
        <label for="link">
          Link
          <input id="link" name="link" type="text" inputmode="url" placeholder="https://exemplo.com" autocomplete="url" required>
        </label>

        <div class="actions">
          <button type="submit">Gerar QR Code</button>
          <button id="download" class="secondary" type="button" hidden>Baixar PNG</button>
          <button id="download-pdf" class="secondary" type="button" hidden>Baixar PDF</button>
        </div>

        <div id="message" class="message" aria-live="polite"></div>
      </form>
    </section>

    <section class="preview" aria-label="Prévia do QR Code">
      <div id="qr-box" class="qr-box">
        <span class="tiny">O QR Code aparece aqui</span>
        <img id="qr-image" alt="QR Code gerado">
      </div>
      <p class="tiny">A imagem é gerada em PNG com 600 x 600 px.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
