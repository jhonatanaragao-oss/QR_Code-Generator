<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gerador de QR Code</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #16181d;
      --muted: #5f6673;
      --line: #d9dde5;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --danger: #b42318;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(100%, 760px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 20px;
      align-items: stretch;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 18px 60px rgba(16, 24, 40, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    input:focus {
      outline: 3px solid rgba(15, 118, 110, 0.16);
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      font: inherit;
      font-weight: 800;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      color: var(--text);
      background: #eef1f5;
    }

    button.secondary:hover {
      background: #e2e7ee;
    }

    .message {
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }

    .message.error {
      color: var(--danger);
      font-weight: 700;
    }

    .preview {
      display: grid;
      place-items: center;
      gap: 14px;
      text-align: center;
    }

    .qr-box {
      width: 220px;
      height: 220px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      overflow: hidden;
    }

    .qr-box img {
      width: 100%;
      height: 100%;
      display: none;
      object-fit: contain;
    }

    .qr-box.has-code img {
      display: block;
    }

    .qr-box.has-code span {
      display: none;
    }

    .tiny {
      font-size: 13px;
    }

    @media (max-width: 720px) {
      body {
        align-items: start;
      }

      main {
        grid-template-columns: 1fr;
      }

      section {
        padding: 18px;
      }

      h1 {
        font-size: 24px;
      }

      .qr-box {
        width: min(100%, 260px);
        height: auto;
        aspect-ratio: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Gerador de QR Code</h1>
      <p>Cole um link, gere o QR Code e use a imagem onde precisar.</p>

      <form id="qr-form" novalidate>
        <label for="link">
          Link
          <input id="link" name="link" type="text" inputmode="url" placeholder="https://exemplo.com" autocomplete="url" required>
        </label>

        <div class="actions">
          <button type="submit">Gerar QR Code</button>
          <button id="download" class="secondary" type="button" hidden>Baixar PNG</button>
          <button id="download-pdf" class="secondary" type="button" hidden>Baixar PDF</button>
        </div>

        <div id="message" class="message" aria-live="polite"></div>
      </form>
    </section>

    <section class="preview" aria-label="Prévia do QR Code">
      <div id="qr-box" class="qr-box">
        <span class="tiny">O QR Code aparece aqui</span>
        <img id="qr-image" alt="QR Code gerado">
      </div>
      <p class="tiny">A imagem é gerada em PNG com 600 x 600 px.</p>
    </section>
  </main>

  <script>
    const form = document.querySelector("#qr-form");
    const input = document.querySelector("#link");
    const image = document.querySelector("#qr-image");
    const qrBox = document.querySelector("#qr-box");
    const message = document.querySelector("#message");
    const download = document.querySelector("#download");
    const downloadPdf = document.querySelector("#download-pdf");
    let currentQrUrl = "";

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return "";
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      return `https://${trimmed}`;
    }

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const url = normalizeUrl(input.value);
      input.value = url;

      try {
        new URL(url);
      } catch {
        setMessage("Digite um link válido.", true);
        input.focus();
        return;
      }

      const qrUrl = new URL("https://api.qrserver.com/v1/create-qr-code/");
      qrUrl.searchParams.set("size", "600x600");
      qrUrl.searchParams.set("margin", "20");
      qrUrl.searchParams.set("format", "png");
      qrUrl.searchParams.set("data", url);

      image.src = qrUrl.toString();
      currentQrUrl = qrUrl.toString();
      download.hidden = false;
      downloadPdf.hidden = false;
      qrBox.classList.add("has-code");
      setMessage("QR Code gerado.");
    });

    function saveBlob(blob, filename) {
      const fileUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = fileUrl;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(fileUrl);
    }

    download.addEventListener("click", async () => {
      if (!currentQrUrl) return;

      download.disabled = true;
      setMessage("Preparando download...");

      try {
        const response = await fetch(currentQrUrl);
        if (!response.ok) throw new Error("Falha ao baixar imagem.");

        const blob = await response.blob();
        saveBlob(blob, "qr-code.png");
        setMessage("Download iniciado.");
      } catch {
        setMessage("Não foi possível baixar automaticamente. Tente gerar novamente.", true);
      } finally {
        download.disabled = false;
      }
    });

    async function createPdfFromQr() {
      const response = await fetch(currentQrUrl);
      if (!response.ok) throw new Error("Falha ao baixar imagem.");

      const imageBlob = await response.blob();
      const bitmap = await createImageBitmap(imageBlob);
      const canvas = document.createElement("canvas");
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;

      const context = canvas.getContext("2d");
      context.fillStyle = "#ffffff";
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.drawImage(bitmap, 0, 0);

      const jpegBlob = await new Promise((resolve) => {
        canvas.toBlob(resolve, "image/jpeg", 0.95);
      });
      const jpegBytes = new Uint8Array(await jpegBlob.arrayBuffer());

      const encoder = new TextEncoder();
      const objects = [];
      const pageWidth = 595;
      const pageHeight = 842;
      const qrSize = 360;
      const qrX = (pageWidth - qrSize) / 2;
      const qrY = (pageHeight - qrSize) / 2;
      const content = `q\n${qrSize} 0 0 ${qrSize} ${qrX} ${qrY} cm\n/Im1 Do\nQ\n`;

      objects.push(encoder.encode("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n"));
      objects.push(encoder.encode("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n"));
      objects.push(encoder.encode(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /XObject << /Im1 4 0 R >> /ProcSet [/PDF /ImageC] >> /Contents 5 0 R >>\nendobj\n`));
      objects.push([
        encoder.encode(`4 0 obj\n<< /Type /XObject /Subtype /Image /Width ${canvas.width} /Height ${canvas.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`),
        jpegBytes,
        encoder.encode("\nendstream\nendobj\n")
      ]);
      objects.push(encoder.encode(`5 0 obj\n<< /Length ${encoder.encode(content).length} >>\nstream\n${content}endstream\nendobj\n`));

      const chunks = [encoder.encode("%PDF-1.4\n")];
      const offsets = [0];
      let length = chunks[0].length;

      for (const object of objects) {
        offsets.push(length);
        const parts = Array.isArray(object) ? object : [object];
        for (const part of parts) {
          chunks.push(part);
          length += part.length;
        }
      }

      const xrefOffset = length;
      let xref = "xref\n0 6\n0000000000 65535 f \n";
      for (let index = 1; index < offsets.length; index++) {
        xref += `${String(offsets[index]).padStart(10, "0")} 00000 n \n`;
      }
      xref += `trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;
      chunks.push(encoder.encode(xref));

      return new Blob(chunks, { type: "application/pdf" });
    }

    downloadPdf.addEventListener("click", async () => {
      if (!currentQrUrl) return;

      downloadPdf.disabled = true;
      setMessage("Preparando PDF...");

      try {
        const pdfBlob = await createPdfFromQr();
        saveBlob(pdfBlob, "qr-code.pdf");
        setMessage("Download do PDF iniciado.");
      } catch {
        setMessage("Não foi possível gerar o PDF. Tente gerar novamente.", true);
      } finally {
        downloadPdf.disabled = false;
      }
    });

    //ok ..
  </script>
</body>
</html>
