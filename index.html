<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Central de Ferramentas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Categorias de ferramentas">
      <div class="brand">
        <span class="brand-mark">FT</span>
        <div>
          <strong>Flex Tools</strong>
          <span>Central rápida</span>
        </div>
      </div>

      <label class="search-field" for="search">
        <span>Buscar ferramenta</span>
        <input id="search" type="search" placeholder="Ex.: QR Code, IMC, imagem">
      </label>

      <nav class="category-nav" id="category-nav"></nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <h1>Hub de utilidades</h1>
          <p class="intro">Organize, converta, calcule e gere recursos em uma única página.</p>
        </div>
      </header>

      <section class="content-grid">
        <div>
          <div class="section-heading">
            <div>
              <p class="eyebrow">Catálogo</p>
              <h2 id="current-title">Todas as ferramentas</h2>
            </div>
            <span class="result-count" id="result-count">0 resultados</span>
          </div>

          <div class="tools-grid" id="tools-grid"></div>
          <p class="empty-state" id="empty-state" hidden>Nenhuma ferramenta encontrada.</p>
        </div>

        <aside class="tool-panel" id="tool-panel" aria-live="polite" hidden></aside>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
